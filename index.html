<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lightgray: 'hsl(212, 45%, 89%)',
            grayishblue: 'hsl(220, 15%, 55%)',
            darkblue: 'hsl(218, 44%, 22%)',
          },
          borderRadius: {
            'customlg': '0.6rem'
          },
          boxShadow: {
            'customlg': '0 10px 25px -3px rgb(0 0 0 / 0.1)',
          }
        }
      }
    }
  </script>
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>
  <style>
    body {
      font-family: "Outfit", sans-serif;
    }
  </style>
</head>

<body class="bg-lightgray flex flex-row h-screen w-screen justify-center items-center">
  <h1 class="sr-only">QR code component</h1>
  <main>
    <div class="h-auto w-72 rounded-2xl p-3.5 bg-white shadow-customlg">
      <img src="images/image-qr-code.png" class="rounded-customlg mb-5" alt="QR code to frontendmentor.io" />
      <p class="font-bold text-xl leading-tight text-darkblue text-center mb-4">Improve your front-end skills by
        building
        projects
      </p>
      <p class="text-center text-grayishblue text-sm mb-5 px-2 leading-tight">Scan the QR code to visit Frontend Mentor
        and
        take
        your coding
        skills to the
        next level</p>
    </div>
    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  </main>
</body>

</html>
